<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <style>
      :root {
        --paper: #dbeaf1;
        --ink: #17304a;
        --blue: #0a9ed8;
        --blue-soft: #bde8f7;
        --green: #32aa76;
        --green-soft: #ccefdc;
        --cream: #fff7df;
        --yellow: #ffd65a;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        background: var(--paper);
        font-family: system-ui, sans-serif;
        overflow: hidden;
      }

      .asset {
        position: relative;
        overflow: hidden;
        background: var(--paper);
      }

      #hero {
        width: 1440px;
        height: 960px;
      }

      .card {
        width: 720px;
        height: 360px;
      }

      #guide {
        width: 820px;
        height: 280px;
      }

      .obj {
        position: absolute;
        width: var(--w);
        transform: rotate(var(--r, 0deg));
      }

      svg {
        width: 100%;
        height: auto;
        overflow: visible;
      }

      .line {
        fill: #fff8e5;
        stroke: var(--ink);
        stroke-width: 5;
        stroke-linecap: round;
        stroke-linejoin: round;
      }

      .blue {
        fill: var(--blue-soft);
      }

      .green {
        fill: var(--green-soft);
      }

      .yellow {
        fill: var(--yellow);
      }

      .dark {
        fill: var(--ink);
      }

      .skin {
        fill: #ffe9c2;
      }

      .shadow {
        filter: drop-shadow(5px 6px 0 rgba(23, 48, 74, 0.08));
      }
    </style>
  </head>
